<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>
  <!-- Clock circle -->
  <circle cx="16" cy="16.5" r="9" stroke="white" stroke-width="1.8" stroke-opacity="0.95"/>
  <!-- Clock hands -->
  <line x1="16" y1="16.5" x2="16" y2="10.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16.5" x2="20.5" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16.5" r="1.2" fill="white"/>
</svg>
